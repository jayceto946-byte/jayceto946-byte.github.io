<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="color-scheme" content="light dark">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav aria-label="主导航">
        <a href="{{ '/#writing' | relative_url }}">文章</a>
        <a href="{{ '/#projects' | relative_url }}">项目</a>
        <a href="{{ '/write/' | relative_url }}">写作</a>
        <a href="https://github.com/jayceto946-byte">GitHub</a>
      </nav>
    </header>
    <main>{{ content }}</main>
    <footer><p>© {{ 'now' | date: '%Y' }} Jayce. Built with Jekyll and GitHub Pages.</p></footer>
  </div>
</body>
</html>
