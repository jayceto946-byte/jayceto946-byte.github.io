---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="meta">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="summary">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">{{ content }}</div>
  <p class="back-link"><a href="{{ '/#writing' | relative_url }}">返回文章列表</a></p>
</article>
