---
layout: default
---
<div class="intro">
  <h1>构建，理解，记录。</h1>
  <p>这里记录软件开发、AI 与学习系统的实践笔记。</p>
</div>
<section id="writing" aria-labelledby="writing-title">
  <h2 id="writing-title">文章</h2>
  {% if site.posts.size > 0 %}
    <ul class="list">
      {% for post in site.posts %}
        <li>
          <time class="meta" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
          <a class="item-title" href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="empty">第一篇文章正在整理中。</p>
  {% endif %}
</section>
<section id="projects" aria-labelledby="projects-title">
  <h2 id="projects-title">项目</h2>
  <ul class="list">
    <li><span class="meta">GitHub</span><a class="item-title" href="https://github.com/jayceto946-byte/kaoyan-assistant">kaoyan-assistant</a></li>
  </ul>
</section>
<section aria-labelledby="about-title">
  <h2 id="about-title">关于</h2>
  <p class="empty">我是 Jayce，一名持续学习和构建的开发者。</p>
</section>
